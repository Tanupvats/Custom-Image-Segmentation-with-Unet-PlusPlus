
experiment:
  name: unetpp_effnetb3
  output_dir: runs/unetpp_effnetb3
  seed: 42

model:
  family: unetpp                    # unetpp | segformer | sam
  encoder_name: efficientnet-b3
  encoder_weights: imagenet
  decoder_channels: [256, 128, 64, 32, 16]
  num_classes: 50
  deep_supervision: true            # use the L1..L4 outputs from UNet++
  in_channels: 3

data:
  train_images: data/car_parts/train/images
  train_masks:  data/car_parts/train/masks
  val_images:   data/car_parts/val/images
  val_masks:    data/car_parts/val/masks
  image_size: 512                   # 512 is much better than 256 for fine parts
  mask_suffix_replace: null         # e.g. ['.jpg', '.png'] if image/mask names differ
  ignore_index: 255                 # pixel value in mask treated as ignore

train:
  epochs: 80
  batch_size: 8
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  scheduler: cosine                 # cosine | plateau | none
  warmup_epochs: 3
  grad_clip_norm: 1.0
  amp: true                         # mixed precision
  ema_decay: 0.999                  # null to disable
  log_every: 20

loss:
  # Compound: dice + ce is the standard. Add focal for severe imbalance.
  components:
    - {type: dice, weight: 1.0, mode: multiclass, from_logits: true}
    - {type: cross_entropy, weight: 1.0, label_smoothing: 0.05}
  # If null, no class weighting. Provide a list of length num_classes to weight.
  class_weights: null

augment:
  # Sensible augs for car exteriors. No vertical flip / 90-degree rotation.
  horizontal_flip_p: 0.5
  shift_scale_rotate_p: 0.5
  shift_limit: 0.0625
  scale_limit: 0.10
  rotate_limit: 12
  brightness_contrast_p: 0.5
  hue_saturation_p: 0.4
  gauss_noise_p: 0.2
  motion_blur_p: 0.15
  cutout_p: 0.2
  cutout_max_holes: 4
  cutout_max_size: 32

eval:
  tta: false                        # enable test-time augmentation at val time
  sliding_window: false             # for high-res images
  sliding_window_size: 512
  sliding_window_stride: 384

logging:
  tensorboard: true
  wandb: false
  wandb_project: car-parts-seg
