

experiment:
  name: sam_vit_b_finetune
  output_dir: runs/sam_vit_b_finetune
  seed: 42

model:
  family: sam
  sam_model_type: vit_b             # vit_b (~91M) | vit_l (~308M) | vit_h (~636M)
  sam_checkpoint: weights/sam_vit_b_01ec64.pth   # download from Meta
  num_classes: 50
  freeze_image_encoder: true        # standard SAM fine-tuning recipe
  freeze_prompt_encoder: false      # prompt encoder is tiny; train it
  multimask_output: false           # we want one mask per prompt for fine-tuning
  mode: prompted                    # prompted | auto

data:
  train_images: data/car_parts/train/images
  train_masks:  data/car_parts/train/masks
  val_images:   data/car_parts/val/images
  val_masks:    data/car_parts/val/masks
  image_size: 1024                  # SAM's native input size
  mask_suffix_replace: null
  ignore_index: 255

# Prompt sampling for training (only used in mode=prompted)
prompts:
  point_per_class_p: 0.6            # sample foreground points
  box_per_class_p:   0.4            # sample tight bbox prompt
  max_classes_per_image: 8          # sample this many random classes per image / step
  point_jitter_px: 6                # randomize point location for robustness
  box_jitter_px: 10

train:
  epochs: 30
  batch_size: 2                     # SAM is heavy; 1024^2 inputs
  accum_steps: 4                    # effective batch = 8
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  scheduler: cosine
  warmup_epochs: 1
  grad_clip_norm: 1.0
  amp: true
  ema_decay: null
  log_every: 10

loss:
  components:
    - {type: dice,  weight: 1.0, mode: binary, from_logits: true}
    - {type: focal, weight: 20.0, alpha: 0.25, gamma: 2.0, mode: binary}   # SAM paper recipe
  class_weights: null

augment:
  horizontal_flip_p: 0.5
  shift_scale_rotate_p: 0.3
  shift_limit: 0.04
  scale_limit: 0.08
  rotate_limit: 8
  brightness_contrast_p: 0.4
  hue_saturation_p: 0.3
  gauss_noise_p: 0.1
  motion_blur_p: 0.1
  cutout_p: 0.0
  cutout_max_holes: 0
  cutout_max_size: 0

eval:
  # For prompted SAM, evaluation samples a center-of-mass point per GT class
  # and measures per-class IoU on the resulting binary mask.
  prompt_strategy: center_point     # center_point | bbox | both

logging:
  tensorboard: true
  wandb: false
  wandb_project: car-parts-seg
